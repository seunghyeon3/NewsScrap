<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>뉴스 스크랩</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273548;
      --border: #334155;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --danger: #f87171;
      --success: #34d399;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 24px;
    }

    /* 상단 헤더 */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* 검색 패널 */
    .panel {
      background: var(--surface);
      margin: 14px 16px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* 검색 버튼 */
    .btn-search {
      width: 100%;
      padding: 14px;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-search:active { opacity: .75; }
    .btn-search.loading { opacity: .6; pointer-events: none; }

    /* 상태 메시지 */
    .status {
      margin: 12px 16px 0;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .status.info { background: #0ea5e920; color: var(--accent); border: 1px solid #0ea5e940; display: block; }
    .status.error { background: #f8717120; color: var(--danger); border: 1px solid #f8717140; display: block; }
    .status.success { background: #34d39920; color: var(--success); border: 1px solid #34d39940; display: block; }

    /* 뉴스 목록 */
    .list { display: flex; flex-direction: column; gap: 10px; margin: 14px 16px 0; }

    .item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-decoration: none;
      display: block;
      transition: border-color .15s;
    }
    .item:active { border-color: var(--accent); }

    .item-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
    }
    .item-meta {
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .item-source {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }
    .item-date {
      font-size: 12px;
      color: var(--text2);
    }
    .item-desc {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 페이저 */
    .pager {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin: 20px 16px 0;
      flex-wrap: wrap;
    }
    .pager-btn {
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: all .15s;
    }
    .pager-btn.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
      font-weight: 700;
    }
    .pager-btn:active { opacity: .7; }

    /* 로딩 스피너 */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <h1>📰 뉴스 스크랩</h1>
  <p>Google 뉴스 검색 · 날짜 필터</p>
</div>

<div class="panel">
  <div>
    <label>검색어</label>
    <input id="q" type="search" placeholder="검색어를 입력하세요" />
  </div>

  <div>
    <label>날짜 조건</label>
    <select id="dateMode">
      <option value="today">오늘</option>
      <option value="yesterday">어제</option>
      <option value="week">최근 7일</option>
      <option value="month">최근 한 달</option>
      <option value="custom">직접 입력</option>
    </select>
  </div>

  <div class="row2" id="dateInputs" style="display:none">
    <div>
      <label>시작일</label>
      <input id="startDate" type="date" />
    </div>
    <div>
      <label>종료일</label>
      <input id="endDate" type="date" />
    </div>
  </div>

  <div class="row2">
    <div>
      <label>페이지당</label>
      <select id="pageSize">
        <option>10</option>
        <option selected>20</option>
        <option>30</option>
        <option>50</option>
      </select>
    </div>
    <div>
      <label>정렬</label>
      <select id="sort">
        <option value="date">최신순</option>
        <option value="relevance">관련도순</option>
      </select>
    </div>
  </div>

  <button class="btn-search" id="searchBtn">
    <span id="btnText">검색</span>
  </button>
</div>

<div id="status" class="status"></div>
<div id="list" class="list"></div>
<div id="pager" class="pager"></div>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (msg ? type : '');
}

function ymd(d) { return d.toISOString().slice(0, 10); }

function applyDateMode() {
  const mode = document.getElementById('dateMode').value;
  const today = new Date();
  const inputs = document.getElementById('dateInputs');

  if (mode === 'custom') {
    inputs.style.display = 'grid';
    return;
  }
  inputs.style.display = 'none';

  let start = new Date(today), end = new Date(today);
  if (mode === 'yesterday') { start.setDate(start.getDate()-1); end.setDate(end.getDate()-1); }
  else if (mode === 'week')  { start.setDate(start.getDate()-7); }
  else if (mode === 'month') { start.setMonth(start.getMonth()-1); }

  document.getElementById('startDate').value = ymd(start);
  document.getElementById('endDate').value   = ymd(end);
}

document.getElementById('dateMode').addEventListener('change', applyDateMode);
applyDateMode(); // 초기값 적용

let allItems = [], currentPage = 1;

function render() {
  const size  = parseInt(document.getElementById('pageSize').value, 10);
  const total = Math.ceil(allItems.length / size) || 1;
  const start = (currentPage - 1) * size;
  const page  = allItems.slice(start, start + size);

  document.getElementById('list').innerHTML = page.map(it => `
    <a class="item" href="${it.link}" target="_blank" rel="noopener">
      <div class="item-title">${it.title}</div>
      <div class="item-meta">
        <span class="item-source">${it.source || ''}</span>
        <span class="item-date">${it.pubDate}</span>
      </div>
      ${it.snippet ? `<div class="item-desc">${it.snippet}</div>` : ''}
    </a>
  `).join('');

  const pager = document.getElementById('pager');
  if (total <= 1) { pager.innerHTML = ''; return; }

  let html = `<button class="pager-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  const delta = 2;
  for (let i = 1; i <= total; i++) {
    if (i === 1 || i === total || (i >= currentPage-delta && i <= currentPage+delta)) {
      html += `<button class="pager-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage-delta-1 || i === currentPage+delta+1) {
      html += `<button class="pager-btn" disabled>…</button>`;
    }
  }
  html += `<button class="pager-btn" onclick="goPage(${currentPage+1})">›</button>`;
  pager.innerHTML = html;
}

function goPage(p) {
  const size  = parseInt(document.getElementById('pageSize').value, 10);
  const total = Math.ceil(allItems.length / size);
  if (p < 1 || p > total) return;
  currentPage = p;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function stripHtml(s) {
  return s ? s.replace(/<[^>]*>/g, '') : '';
}

async function search() {
  const q     = document.getElementById('q').value.trim();
  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;
  const sort  = document.getElementById('sort').value;

  if (!q) { setStatus('검색어를 입력해주세요', 'error'); return; }

  // 버튼 로딩 상태
  const btn  = document.getElementById('searchBtn');
  const txt  = document.getElementById('btnText');
  btn.classList.add('loading');
  txt.innerHTML = '<div class="spinner"></div>';
  setStatus('검색 중...', 'info');

  // 날짜 필터 쿼리 생성 (after: 는 시작일-1일, before: 는 종료일 그대로)
  let dateFilter = '';
  if (start) {
    const d = new Date(start);
    d.setDate(d.getDate() - 1);
    dateFilter += ` after:${ymd(d)}`;
  }
  if (end) {
    dateFilter += ` before:${end}`;
  }

  const fullQ    = encodeURIComponent(q + dateFilter);
  const sortParam = sort === 'date' ? '&scoring=d' : '';
  const rssUrl   = `https://news.google.com/rss/search?q=${fullQ}&hl=ko&gl=KR&ceid=KR:ko${sortParam}`;
  const proxyUrl = PROXY + encodeURIComponent(rssUrl);

  try {
    const res  = await fetch(proxyUrl);
    const json = await res.json();
    const parser = new DOMParser();
    const doc  = parser.parseFromString(json.contents, 'text/xml');
    const itemEls = doc.querySelectorAll('item');

    allItems = [];
    itemEls.forEach(el => {
      const pubRaw = el.querySelector('pubDate')?.textContent || '';
      let pubStr = '';
      try { pubStr = new Date(pubRaw).toISOString().slice(0, 10); } catch(e) {}

      // 날짜 2차 필터
      if (start && pubStr && pubStr < start) return;
      if (end   && pubStr && pubStr > end)   return;

      allItems.push({
        title:   stripHtml(el.querySelector('title')?.textContent || ''),
        link:    el.querySelector('link')?.textContent || '',
        source:  el.querySelector('source')?.textContent || '',
        snippet: stripHtml(el.querySelector('description')?.textContent || ''),
        pubDate: pubStr,
      });
    });

    currentPage = 1;
    render();
    setStatus(`검색 완료 · ${allItems.length}건`, 'success');
  } catch(e) {
    setStatus('검색 실패: 네트워크를 확인해주세요', 'error');
  } finally {
    btn.classList.remove('loading');
    txt.textContent = '검색';
  }
}

document.getElementById('searchBtn').addEventListener('click', search);
document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
</script>
</body>
</html>
