<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>뉴스 스크랩 프로그램</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;background:#f6f7fb;color:#111}
    .wrap{max-width:1100px;margin:0 auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
    h1{margin:0 0 16px;font-size:24px}
    .grid{display:grid;grid-template-columns:1.2fr .8fr .8fr .6fr;gap:12px}
    .grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
    input,select,button{width:100%;padding:11px 12px;border:1px solid #d7dbe7;border-radius:10px;font-size:14px;box-sizing:border-box}
    button{background:#2563eb;color:#fff;border:none;cursor:pointer;font-weight:600}
    .status{margin:14px 0;padding:10px 12px;background:#eef4ff;border-radius:10px;color:#1d4ed8;font-size:14px;display:none}
    .list{display:grid;gap:12px;margin-top:16px}
    .item{padding:14px;border:1px solid #e5e7ef;border-radius:12px}
    .item a{color:#111;text-decoration:none;font-weight:700}
    .meta{margin-top:6px;color:#666;font-size:13px}
    .desc{margin-top:8px;color:#333;font-size:14px;line-height:1.5}
    .pager{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:20px;padding:20px 0}
    .pager a{cursor:pointer;color:#2563eb;padding:5px 10px;text-decoration:none;border:1px solid #d7dbe7;border-radius:5px}
    .pager a.active{font-weight:800;background:#2563eb;color:#fff}
  </style>
</head>
<body>
<div class="wrap">
  <h1>뉴스 스크랩 프로그램</h1>
  <div class="grid">
    <div><label>검색어</label><input id="q" /></div>
    <div><label>날짜 조건</label><select id="dateMode"><option value="custom">년월일 지정</option><option value="today">오늘</option><option value="yesterday">어제</option><option value="week">오늘 기준 7일 전까지</option></select></div>
    <div><label>시작일</label><input id="startDate" type="date" /></div>
    <div><label>종료일</label><input id="endDate" type="date" /></div>
  </div>
  <div class="grid2">
    <div><label>페이지당 개수</label><select id="pageSize"><option>10</option><option selected>20</option><option>30</option><option>40</option><option>50</option></select></div>
    <div><label>정렬</label><select id="sort"><option value="date">최신순</option><option value="relevance">관련도순</option></select></div>
    <div style="display:flex;align-items:end"><button id="searchBtn">검색</button></div>
  </div>
  <div id="status" class="status"></div>
  <div id="list" class="list"></div>
  <div id="pager" class="pager"></div>
</div>
<script>
const statusEl = document.getElementById('status'), pagerEl = document.getElementById('pager');
function setStatus(msg){ statusEl.textContent = msg; statusEl.style.display = msg ? 'block' : 'none'; }
function updateDates(){
  const mode = document.getElementById('dateMode').value;
  if(mode === 'custom') return;
  const today = new Date(), ymd = d => d.toISOString().slice(0,10);
  if(mode === 'today') { document.getElementById('startDate').value = ymd(today); document.getElementById('endDate').value = ymd(today); }
  else if(mode === 'yesterday') { const d=new Date(today); d.setDate(d.getDate()-1); document.getElementById('startDate').value = ymd(d); document.getElementById('endDate').value = ymd(d); }
  else if(mode === 'week') { const d=new Date(today); d.setDate(d.getDate()-7); document.getElementById('startDate').value = ymd(d); document.getElementById('endDate').value = ymd(today); }
  else if(mode === 'month') { const d=new Date(today); d.setMonth(d.getMonth()-1); document.getElementById('startDate').value = ymd(d); document.getElementById('endDate').value = ymd(today); }
}
document.getElementById('dateMode').onchange = updateDates;
let allItems = [], currentPage = 1;
function render(){
  const size = parseInt(document.getElementById('pageSize').value,10);
  const totalPages = Math.ceil(allItems.length / size) || 1;
  const start = (currentPage-1)*size;
  const pageItems = allItems.slice(start, start+size);
  document.getElementById('list').innerHTML = pageItems.map(it => `<div class="item"><a href="${it.link}" target="_blank">${it.title}</a><div class="meta">${it.source} · ${it.pubDate}</div><div class="desc">${it.snippet}</div></div>`).join('');
  let pHTML = `<a onclick="changePage(${currentPage-1})">&lt;</a>`;
  for(let i=1; i<=totalPages; i++) pHTML += `<a class="${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</a>`;
  pHTML += `<a onclick="changePage(${currentPage+1})">&gt;</a>`;
  pagerEl.innerHTML = pHTML;
}
function changePage(p){
  const size = parseInt(document.getElementById('pageSize').value,10);
  const totalPages = Math.ceil(allItems.length / size);
  if(p<1 || p>totalPages) return;
  currentPage = p;
  render();
}
async function search(){
  setStatus('검색 중...');
  const url = new URL('/api/search', location.origin);
  url.searchParams.set('q', document.getElementById('q').value);
  url.searchParams.set('start', document.getElementById('startDate').value);
  url.searchParams.set('end', document.getElementById('endDate').value);
  url.searchParams.set('sort', document.getElementById('sort').value); // ← 추가
  try {
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){ setStatus('오류: ' + data.error); return; }
    allItems = data.items;
    currentPage = 1;
    render();
    setStatus(`검색 완료 (${allItems.length}건)`);
  }catch(e){setStatus('실패: 서버 실행 확인');}
}
document.getElementById('searchBtn').onclick = search;
</script>
</body>
</html>
